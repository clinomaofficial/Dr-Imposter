workflows:
  android-capacitor:
    name: Android Capacitor APK Build
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web application
        script: |
          npm run build
      - name: Sync Capacitor to Android
        script: |
          npx @capacitor/cli sync
      - name: Build Android APK (Debug)
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
